<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры - Pax Historia</title>
    <style>
        /* Базовые стили из оригинального кода (bg-background, text-zinc-100) */
        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background-color: #09090b; /* Глубокий темный фон zinc-950 */
            color: #f4f4f5; /* Светлый текст zinc-100 */
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Боковое меню (Sidebar) */
        aside {
            width: 240px;
            background-color: #18181b; /* Цвет блоков zinc-800/900 */
            border-right: 1px solid #27272a;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        aside .logo {
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid #27272a;
        }

        aside a {
            color: #a1a1aa;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        aside a:hover, aside a.active {
            background-color: #27272a;
            color: #fff;
        }

        /* Главная рабочая область */
        main {
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
            max-width: 1200px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            color: #fff;
        }

        h2 {
            font-size: 1.4rem;
            color: #f4f4f5;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        /* Сетка для игровых карточек */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Стили карточки игры, как на скриншоте */
        .game-card {
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-4px);
            border-color: #3f3f46;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .game-card .image-placeholder {
            height: 140px;
            background: linear-gradient(to top, #18181b, rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&w=400&q=80'); /* Временный неоновый фон городов */
            background-size: cover;
            background-position: center;
        }

        .game-card .info {
            padding: 15px;
        }

        .game-card .title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 5px;
            color: #fff;
        }

        .game-card .subtitle {
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 12px;
        }

        .game-card .meta {
            font-size: 0.75rem;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Левое меню, как в оригинале -->
    <aside>
        <div class="logo">PAX HISTORIA</div>
        <a href="#" class="active">Ваши игры</a>
        <a href="#">Все сценарии</a>
        <a href="#">Правила ВПИ</a>
        <a href="#">Лор и Фракции</a>
        <a href="#">Настройки</a>
    </aside>

    <!-- Основной контент -->
    <main>
        <h1>Ваши игры</h1>

        <h2>Продолжить игру</h2>
        <div class="games-grid">
            <!-- Карточка Транснистрии со скриншота -->
            <a href="#" class="game-card">
                <div class="image-placeholder"></div>
                <div class="info">
                    <div class="title">Transnistria</div>
                    <div class="subtitle">Modern Day</div>
                    <div class="meta">0 ходов • 22мин назад</div>
                </div>
            </a>
        </div>

        <h2>Недавно начатые</h2>
        <div class="games-grid">
            <a href="#" class="game-card">
                <div class="image-placeholder" style="filter: hue-rotate(90deg);"></div>
                <div class="info">
                    <div class="title">Новая партия</div>
                    <div class="subtitle">Альтернативная история</div>
                    <div class="meta">Создано недавно</div>
                </div>
            </a>
        </div>
    </main>

</body>
</html>
