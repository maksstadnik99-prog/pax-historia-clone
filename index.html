<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечная Карусель Карт</title>
    <!-- Подключаем React и Babel напрямую для работы в одном файле -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Базовые стили для центрирования приложения на странице */
        body {
            margin: 0;
            padding: 0;
            background-color: #121214;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #root {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            // Ровно 3 карты, зацикленные по кругу. Каждая имеет свой цвет.
            const maps = [
                { id: 1, title: 'Левая карта', color: '#3b82f6' },   // Синяя
                { id: 2, title: 'Основная карта', color: '#10b981' }, // Зеленая (Стартовый центр)
                { id: 3, title: 'Правая карта', color: '#f59e0b' },  // Желтая
            ];

            // Начинаем с индекса 1 (Основная карта по центру)
            const [currentIndex, setCurrentIndex] = useState(1);

            // Листаем вперед
            const handleNext = () => {
                setCurrentIndex((prevIndex) => (prevIndex + 1) % maps.length);
            };

            // Листаем назад (с защитой от ухода в минус)
            const handlePrev = () => {
                setCurrentIndex((prevIndex) => (prevIndex - 1 + maps.length) % maps.length);
            };

            // Вычисляем соседа слева (-1) и справа (+1) относительно центра
            const getCardAt = (positionOffset) => {
                const index = (currentIndex + positionOffset + maps.length) % maps.length;
                return maps[index];
            };

            const leftCard = getCardAt(-1);
            const centerCard = getCardAt(0);
            const rightCard = getCardAt(1);

            return (
                <div style={styles.container}>
                    <h3 style={styles.title}>Бесконечная прокрутка трех карт</h3>
                    
                    <div style={styles.carouselWrapper}>
                        
                        {/* ЛЕВАЯ КАРТА */}
                        <div style={{ ...styles.card, ...styles.sideCard, backgroundColor: leftCard.color }}>
                            <span style={styles.cardLabel}>{leftCard.title}</span>
                        </div>

                        {/* ЦЕНТРАЛЬНАЯ (ОСНОВНАЯ) КАРТА */}
                        <div style={{ ...styles.card, ...styles.mainCard, backgroundColor: centerCard.color }}>
                            <span style={styles.mainCardLabel}>{centerCard.title}</span>
                        </div>

                        {/* ПРАВАЯ КАРТА */}
                        <div style={{ ...styles.card, ...styles.sideCard, backgroundColor: rightCard.color }}>
                            <span style={styles.cardLabel}>{rightCard.title}</span>
                        </div>

                    </div>

                    {/* КНОПКИ УПРАВЛЕНИЯ */}
                    <div style={styles.controls}>
                        <button onClick={handlePrev} style={styles.button}>◀ Назад</button>
                        <button onClick={handleNext} style={styles.button}>Вперед ▶</button>
                    </div>
                </div>
            );
        };

        // Встроенные стили интерфейса
        const styles = {
            container: {
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                padding: '30px 20px',
                background: '#1e1e24',
                borderRadius: '16px',
                color: '#fff',
                boxShadow: '0 10px 30px rgba(0,0,0,0.5)',
                width: '100%',
                boxSizing: 'border-box'
            },
            title: {
                margin: '0 0 30px 0',
                color: '#a78bfa',
                fontSize: '22px',
                letterSpacing: '0.5px'
            },
            carouselWrapper: {
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '20px',
                width: '100%',
                height: '300px',
                overflow: 'hidden'
            },
            card: {
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                borderRadius: '12px',
                transition: 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
                boxShadow: '0 8px 25px rgba(0,0,0,0.4)',
                userSelect: 'none'
            },
            mainCard: {
                width: '45%',
                height: '100%',
                zIndex: 2,
                transform: 'scale(1)',
                border: '3px solid #ui',
                borderColor: '#ffffff'
            },
            sideCard: {
                width: '25%',
                height: '80%',
                opacity: 0.4,
                zIndex: 1,
                transform: 'scale(0.9)'
            },
            cardLabel: {
                fontSize: '14px',
                fontWeight: '600',
                color: '#fff',
                textShadow: '1px 1px 3px rgba(0,0,0,0.8)'
            },
            mainCardLabel: {
                fontSize: '18px',
                fontWeight: 'bold',
                color: '#fff',
                textShadow: '1px 1px 4px rgba(0,0,0,0.9)'
            },
            controls: {
                marginTop: '35px',
                display: 'flex',
                gap: '25px'
            },
            button: {
                padding: '12px 28px',
                fontSize: '16px',
                fontWeight: 'bold',
                border: 'none',
                borderRadius: '8px',
                backgroundColor: '#a78bfa',
                color: '#1e1e24',
                cursor: 'pointer',
                boxShadow: '0 4px 10px rgba(167, 139, 250, 0.3)',
                transition: 'all 0.2s ease',
            }
        };

        // Рендерим приложение в корень сайта
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
